CONFIG_ZTEST=y
CONFIG_LOG=y

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# nrfx GPPI for DPPI channel allocation
CONFIG_NRFX_GPPI=y

# Dynamic IRQ for S21DataLinkUart ISR
CONFIG_DYNAMIC_INTERRUPTS=y
